<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💌 情人节快乐</title>
    <script>
        if (localStorage.getItem('surpriseUnlocked') !== 'true') {
            window.location.replace('index.html');
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Outfit:wght@100;300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #050008;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        /* ---- Fireworks canvas ---- */
        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ---- Message stage ---- */
        #msgStage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px;
            gap: 0;
            pointer-events: none;
        }

        .msg {
            position: absolute;
            text-align: center;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .msg.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .msg.hide {
            opacity: 0;
            transform: translateY(-20px) scale(0.98);
        }

        #msg1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: rgba(255, 180, 200, 0.9);
            line-height: 1.8;
            text-shadow: 0 0 30px rgba(255, 100, 140, 0.4);
        }

        #msg2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.6rem, 6.5vw, 2.6rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 77, 109, 0.7), 0 0 80px rgba(255, 77, 109, 0.3);
            letter-spacing: 2px;
        }

        #msg3 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: 700;
            color: #FF4D6D;
            text-shadow: 0 0 40px rgba(255, 77, 109, 0.9), 0 0 80px rgba(255, 77, 109, 0.5);
            letter-spacing: 3px;
        }

        /* ---- Bouquet stage ---- */
        #bouquetStage {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 0;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        #bouquetStage.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* Top message above bouquet */
        #valentineMsg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 32px 20px 12px;
            text-align: center;
            z-index: 15;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 1s 0.5s ease, transform 1s 0.5s ease;
        }

        #valentineMsg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .v-tag {
            font-size: 0.65rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 140, 160, 0.5);
            display: block;
            margin-bottom: 8px;
        }

        .v-love {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        /* ===== BIG BOUQUET ===== */
        .bouquet-wrap {
            width: 100%;
            max-width: 420px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Stem / wrapper base */
        .bouquet-base {
            font-size: clamp(80px, 36vw, 160px);
            line-height: 1;
            letter-spacing: -4px;
            text-align: center;
            filter: drop-shadow(0 -10px 30px rgba(255, 100, 130, 0.5)) drop-shadow(0 0 60px rgba(255, 180, 50, 0.2));
            animation: bouquetFloat 3s ease-in-out infinite;
            transform-origin: bottom center;
            display: block;
            /* Wrapper paper */
        }

        @keyframes bouquetFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-1deg);
            }

            50% {
                transform: translateY(-10px) rotate(1deg);
            }
        }

        /* Individual flower petals layer */
        .flower-layer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(44px, 18vw, 80px);
            line-height: 1;
            letter-spacing: -2px;
            pointer-events: none;
            animation: bouquetFloat 3s ease-in-out infinite;
        }

        /* Sparkling stars around bouquet */
        .sparkle {
            position: absolute;
            font-size: 20px;
            animation: sparkleFloat 2s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(0deg);
            }

            30% {
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: scale(1.3) rotate(45deg) translateY(-20px);
            }
        }

        .bouquet-paper {
            width: clamp(140px, 60vw, 260px);
            height: clamp(70px, 24vw, 120px);
            background: linear-gradient(135deg, #FF4D6D 0%, #ffb3c6 40%, #fff5f7 60%, #FF4D6D 100%);
            border-radius: 0 0 50% 50%;
            margin-top: -20px;
            position: relative;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bouquet-paper::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 0 0 50% 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, transparent 60%);
        }

        /* CTA Button */
        .cta-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 24px 36px;
            display: flex;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s 1.5s ease, transform 1s 1.5s ease;
            pointer-events: none;
        }

        .cta-wrap.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .cta-btn {
            background: linear-gradient(135deg, #FF4D6D, #c90056);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            letter-spacing: 2px;
            padding: 14px 40px;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(255, 77, 109, 0.5);
            animation: pulseBtn 2s ease-in-out infinite;
        }

        @keyframes pulseBtn {

            0%,
            100% {
                box-shadow: 0 4px 30px rgba(255, 77, 109, 0.4);
            }

            50% {
                box-shadow: 0 4px 60px rgba(255, 77, 109, 0.9);
            }
        }

        .cta-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <canvas id="fw"></canvas>

    <!-- MESSAGE STAGE -->
    <div id="msgStage">
        <div class="msg" id="msg1">老婆，对不起<br>这是迟来的情人节</div>
        <div class="msg" id="msg2">情人节快乐 🌹</div>
        <div class="msg" id="msg3">我爱你 ❤️</div>
    </div>

    <!-- BOUQUET STAGE -->
    <div id="bouquetStage">
        <div id="valentineMsg">
            <span class="v-tag">Valentine's Day · 2026</span>
            <span class="v-love">老婆，情人节快乐 🌹 我爱你 ❤️</span>
        </div>

        <div class="bouquet-wrap" id="bouquetWrap">
            <!-- sparkles injected by JS -->
            <div class="flower-layer" style="top:-10px">🌹🌸🌺</div>
            <div
                style="font-size:clamp(70px,30vw,130px);line-height:1;letter-spacing:-4px;text-align:center;filter:drop-shadow(0 -10px 40px rgba(255,100,140,0.6));animation:bouquetFloat 3s ease-in-out infinite;display:block;">
                🌹🌸🌹<br>🌺🌼🌸🌺<br>💐🌹🌷🌸💐
            </div>
            <div class="bouquet-paper"></div>
        </div>
    </div>

    <div class="cta-wrap" id="ctaWrap">
        <button class="cta-btn" onclick="goToSurprise()">开启惊喜 ✨</button>
    </div>

    <script>
        // ===== FIREWORKS =====
        const cvs = document.getElementById('fw');
        const ctx = cvs.getContext('2d');
        let W, H;
        function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const FW_COLORS = [
            '#FF4D6D', '#FFD700', '#FF69B4', '#FF1493',
            '#FFA500', '#FF6B6B', '#FFF', '#f7b2c2',
            '#FFB347', '#DA70D6',
        ];

        const particles = [];
        let fwRunning = false;

        function spawnFirework() {
            const x = W * (0.2 + Math.random() * 0.6);
            const y = H * (0.1 + Math.random() * 0.5);
            const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
            const count = 60 + Math.floor(Math.random() * 40);
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    alpha: 1,
                    size: 2 + Math.random() * 3,
                    color,
                    trail: [],
                    gravity: 0.07 + Math.random() * 0.04,
                });
            }
            // Add heart shape burst for some fireworks
            if (Math.random() > 0.5) {
                for (let t = 0; t < Math.PI * 2; t += 0.15) {
                    const hx = 16 * Math.pow(Math.sin(t), 3) * 0.5;
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * 0.5;
                    particles.push({
                        x, y,
                        vx: hx * 0.15 + (Math.random() - 0.5),
                        vy: hy * 0.15 - 0.5,
                        alpha: 1, size: 3,
                        color: '#FF4D6D',
                        trail: [], gravity: 0.05,
                    });
                }
            }
        }

        let fwInterval;
        function startFireworks() {
            fwRunning = true;
            spawnFirework();
            setTimeout(spawnFirework, 400);
            setTimeout(spawnFirework, 800);
            fwInterval = setInterval(() => {
                if (fwRunning) spawnFirework();
            }, 1200);
            drawFW();
        }

        function drawFW() {
            ctx.fillStyle = 'rgba(5,0,8,0.18)';
            ctx.fillRect(0, 0, W, H);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.985;
                p.alpha -= 0.012;

                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(0.1, p.size * p.alpha), 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (p.alpha <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            if (fwRunning || particles.length > 0) requestAnimationFrame(drawFW);
        }

        // ===== SPARKLES around bouquet =====
        function addSparkles() {
            const wrap = document.getElementById('bouquetWrap');
            const positions = [
                { top: '-10px', left: '5%', delay: '0s' },
                { top: '20px', left: '-5%', delay: '0.4s' },
                { top: '5px', right: '5%', delay: '0.7s' },
                { top: '35px', right: '-5%', delay: '1.1s' },
                { top: '-15px', left: '30%', delay: '0.2s' },
                { top: '-20px', right: '28%', delay: '0.9s' },
            ];
            positions.forEach(p => {
                const s = document.createElement('span');
                s.className = 'sparkle';
                Object.assign(s.style, p);
                s.textContent = ['✨', '⭐', '💫', '🌟'][Math.floor(Math.random() * 4)];
                const dur = (1.5 + Math.random()).toFixed(1) + 's';
                s.style.animationDuration = dur;
                s.style.animationDelay = p.delay;
                s.style.animationIterationCount = 'infinite';
                wrap.appendChild(s);
            });
        }

        // ===== MESSAGE SEQUENCE =====
        function showMsg(id) { document.getElementById(id).classList.add('show'); }
        function hideMsg(id) { document.getElementById(id).classList.add('hide'); setTimeout(() => { const el = document.getElementById(id); el.classList.remove('show', 'hide'); }, 900); }

        function runSequence() {
            // msg1 at 0.5s
            setTimeout(() => showMsg('msg1'), 500);
            // msg1 out, msg2 in at 3.5s
            setTimeout(() => { hideMsg('msg1'); setTimeout(() => showMsg('msg2'), 800); }, 3500);
            // msg2 out, msg3 in at 7s
            setTimeout(() => { hideMsg('msg2'); setTimeout(() => showMsg('msg3'), 800); }, 7000);
            // msg3 out, bouquet + fireworks at 10.5s
            setTimeout(() => {
                hideMsg('msg3');
                setTimeout(() => {
                    document.getElementById('msgStage').style.display = 'none';
                    document.getElementById('bouquetStage').classList.add('show');
                    document.getElementById('valentineMsg').classList.add('show');
                    document.getElementById('ctaWrap').classList.add('show');
                    addSparkles();
                    startFireworks();
                    // Stop auto-spawning after 8s but let particles finish
                    setTimeout(() => { fwRunning = false; clearInterval(fwInterval); }, 8000);
                }, 1000);
            }, 10500);
        }

        runSequence();

        function goToSurprise() {
            fwRunning = false; clearInterval(fwInterval);
            const fl = document.createElement('div');
            fl.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;opacity:0;transition:opacity 1.5s ease;pointer-events:none;';
            document.body.appendChild(fl);
            requestAnimationFrame(() => {
                fl.style.opacity = '1';
                setTimeout(() => window.location.replace('surprise.html'), 1800);
            });
        }
    </script>
</body>

</html>
