<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Opening...</title>
    <script>
        // 安全拦截：如果没有从主页正常解锁，直接踢回主页
        if (localStorage.getItem('surpriseUnlocked') !== 'true') {
            window.location.replace('index.html');
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Outfit:wght@100;300&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050005;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            gap: 18px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.3;
            opacity: 0;
            text-shadow: 0 0 60px rgba(255, 180, 200, 0.8), 0 0 120px rgba(229, 100, 150, 0.4);
            animation: rise 2s 1s ease both;
            padding: 0 24px;
        }

        .sub {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 200, 220, 0.5);
            opacity: 0;
            animation: rise 2s 1.8s ease both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #flash {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div class="title">老婆<br>你的惊喜来了 ❤️</div>
        <div class="sub">Opening your gift...</div>
    </div>
    <div id="flash"></div>

    <script>
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        let W, H;

        function resize() {
            W = cvs.width = window.innerWidth;
            H = cvs.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // ---- INK BLOOM SYSTEM ----
        const blobs = [];

        const PALETTE = [
            [220, 60, 120],   // deep rose
            [255, 100, 160],  // hot pink
            [180, 40, 100],   // magenta rose
            [240, 140, 180],  // light pink
            [150, 30, 80],    // dark crimson
            [255, 180, 210],  // blush
            [200, 80, 200],   // violet rose
            [255, 220, 180],  // warm gold
        ];

        class Blob {
            constructor(delay = 0) {
                this.delay = delay;
                this.born = performance.now() + delay;
                this.x = W * 0.15 + Math.random() * W * 0.7;
                this.y = H * 0.15 + Math.random() * H * 0.7;
                this.maxR = Math.min(W, H) * (0.15 + Math.random() * 0.3);
                this.r = 0;
                const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                this.r0 = c[0]; this.g0 = c[1]; this.b0 = c[2];
                this.speed = 0.4 + Math.random() * 0.5; // px per ms
                this.alive = true;
                // Organic wobble
                this.wobbles = Array.from({ length: 8 }, () => ({
                    a: Math.random() * Math.PI * 2,
                    mag: Math.random() * 0.25 + 0.05,
                    spd: (Math.random() - 0.5) * 0.002
                }));
            }

            update(now) {
                const age = now - this.born;
                if (age < 0) return;
                this.r = Math.min(this.maxR, age * this.speed * 0.06);
                if (this.r >= this.maxR) this.alive = false;
                this.wobbles.forEach(w => w.a += w.spd);
            }

            draw(now) {
                const age = now - this.born;
                if (age < 0) return;
                const progress = this.r / this.maxR;
                const alpha = Math.sin(progress * Math.PI) * 0.18; // fade in and out
                if (alpha <= 0) return;

                // Build path with organic wobble
                ctx.beginPath();
                const steps = 80;
                for (let i = 0; i <= steps; i++) {
                    const theta = (i / steps) * Math.PI * 2;
                    let wobbleR = 1;
                    this.wobbles.forEach(w => {
                        wobbleR += Math.sin(theta * (Math.floor(Math.random() * 3) + 2) + w.a) * w.mag;
                    });
                    const rx = this.x + Math.cos(theta) * this.r * wobbleR;
                    const ry = this.y + Math.sin(theta) * this.r * wobbleR * 0.9;
                    i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
                }
                ctx.closePath();

                const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                grd.addColorStop(0, `rgba(${this.r0},${this.g0},${this.b0},${alpha * 1.5})`);
                grd.addColorStop(0.5, `rgba(${this.r0},${this.g0},${this.b0},${alpha})`);
                grd.addColorStop(1, `rgba(${this.r0},${this.g0},${this.b0},0)`);
                ctx.fillStyle = grd;
                ctx.fill();
            }
        }

        // Spawn blobs on staggered schedule
        const SPAWN_TIMES = [];
        for (let i = 0; i < 18; i++) SPAWN_TIMES.push(i * 200 + Math.random() * 150);

        function spawnBlobs() {
            SPAWN_TIMES.forEach(t => blobs.push(new Blob(t)));
        }
        spawnBlobs();

        // Re-spawn loop every ~3.5s to keep it alive
        setInterval(() => {
            // only respawn if still on page
            for (let i = 0; i < 8; i++) blobs.push(new Blob(i * 180));
        }, 3500);

        // ---- RENDER LOOP ----
        function loop() {
            const now = performance.now();
            // Very slight darkness trail (no full clear = ink accumulation effect)
            ctx.fillStyle = 'rgba(5,0,5,0.06)';
            ctx.fillRect(0, 0, W, H);

            const alive = [];
            for (const b of blobs) {
                b.update(now);
                b.draw(now);
                if (b.alive || performance.now() - b.born < 0) alive.push(b);
            }
            // Replace dead blobs
            blobs.length = 0;
            blobs.push(...alive);

            requestAnimationFrame(loop);
        }
        loop();

        // ---- TRANSITION ----
        setTimeout(() => {
            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => window.location.replace('prank.html'), 1800);
        }, 3000);
    </script>
</body>

</html>
